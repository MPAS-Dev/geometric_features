name: CI/CD Build Workflow

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  CANCEL_OTHERS: false
  PATHS_IGNORE: '["**/README.md", "**/docs/**"]'
  PIXI_VERSION: "v0.63.0"

jobs:
  pre-commit-hooks:
    name: lint with pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          cancel_others: ${{ env.CANCEL_OTHERS }}
          paths_ignore: ${{ env.PATHS_IGNORE }}

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Checkout Code Repository
        uses: actions/checkout@v6

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          environments: default
          activate-environment: true
          cache: true
          locked: true

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        id: file_changes
        uses: trilom/file-changes-action@1.2.4
        with:
          output: ' '

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Run Pre-commit
        run: pre-commit run --file ${{ steps.file_changes.outputs.files}}

  package:
    name: build rattler recipe
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          cancel_others: ${{ env.CANCEL_OTHERS }}
          paths_ignore: ${{ env.PATHS_IGNORE }}

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        uses: actions/checkout@v6

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          environments: package
          activate-environment: package
          cache: true
          locked: true

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Build package with rattler-build
        run: |
          rattler-build build -r recipe/ -c conda-forge --output-dir rattler-build-output

  build:
    name: test geometric_features - python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            environment: py310
          - python-version: "3.11"
            environment: py311
          - python-version: "3.12"
            environment: py312
          - python-version: "3.13"
            environment: py313
          - python-version: "3.14"
            environment: py314
      fail-fast: false
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          cancel_others: ${{ env.CANCEL_OTHERS }}
          paths_ignore: ${{ env.PATHS_IGNORE }}

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        uses: actions/checkout@v6

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          environments: ${{ matrix.environment }}
          activate-environment: ${{ matrix.environment }}
          cache: true
          locked: true

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Run Tests
        env:
          CHECK_IMAGES: False
        run: |
          set -e
          pip check
          pytest --pyargs geometric_features
          combine_features -v
          difference_features -v
          fix_features_at_antimeridian -v
          merge_features -v
          plot_features -v
          set_group_name -v
          simplify_features -v
          split_features -v
          tag_features -v

      - if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        name: Build Sphinx Docs
        run: |
          cd docs
          DOCS_VERSION=test make versioned-html
